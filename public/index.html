<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Meta tags esenciales -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Pandunesiosss - La red social para parejas. Cuando la pelea llegue, un botón los reconcilia con recuerdos y mensajes de amor." />
  <meta name="keywords" content="parejas, amor, reconciliación, red social, relaciones" />
  <meta property="og:title" content="Pandunesiosss - Reconéctate con quien amas" />
  <meta property="og:description" content="¿Peleando? Un botón y tus mejores recuerdos juntos llegan solos." />
  <meta property="og:type" content="website" />
  <title>Pandunesiosss 💑 - Porque el amor siempre gana</title>

  <!-- Fuentes de Google -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet" />

  <style>
    /* ===== RESET Y VARIABLES ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --color-primary: #FF4D6D;
      --color-primary-dark: #C9184A;
      --color-primary-light: #FF8FA3;
      --color-secondary: #FF9F1C;
      --color-accent: #7B2D8B;
      --color-bg: #FFF0F3;
      --color-bg-dark: #1A1A2E;
      --color-text: #2D2D3A;
      --color-text-light: #6B6B80;
      --color-white: #FFFFFF;
      --color-card: #FFFFFF;
      --gradient-main: linear-gradient(135deg, #FF4D6D 0%, #C9184A 50%, #7B2D8B 100%);
      --gradient-soft: linear-gradient(135deg, #FFF0F3 0%, #FFE4E8 100%);
      --gradient-cta: linear-gradient(135deg, #FF4D6D 0%, #FF9F1C 100%);
      --shadow-sm: 0 2px 8px rgba(255, 77, 109, 0.15);
      --shadow-md: 0 8px 32px rgba(255, 77, 109, 0.2);
      --shadow-lg: 0 20px 60px rgba(255, 77, 109, 0.25);
      --radius-sm: 12px;
      --radius-md: 20px;
      --radius-lg: 32px;
      --radius-full: 9999px;
      --font-main: 'Nunito', sans-serif;
      --font-cursive: 'Dancing Script', cursive;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ===== BASE ===== */
    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-main);
      background-color: var(--color-bg);
      color: var(--color-text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== PARTÍCULAS DE FONDO ===== */
    .particles-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      font-size: 1.2rem;
      opacity: 0;
      animation: floatParticle linear infinite;
    }

    @keyframes floatParticle {
      0% {
        opacity: 0;
        transform: translateY(100vh) rotate(0deg);
      }
      10% { opacity: 0.6; }
      90% { opacity: 0.4; }
      100% {
        opacity: 0;
        transform: translateY(-10vh) rotate(720deg);
      }
    }

    /* ===== NAVBAR ===== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 77, 109, 0.1);
      transition: var(--transition);
    }

    .navbar-logo {
      font-family: var(--font-cursive);
      font-size: 1.8rem;
      color: var(--color-primary);
      text-decoration: none;
      letter-spacing: -0.5px;
    }

    .navbar-logo span {
      color: var(--color-accent);
    }

    .navbar-cta {
      background: var(--gradient-main);
      color: var(--color-white);
      border: none;
      padding: 0.6rem 1.5rem;
      border-radius: var(--radius-full);
      font-family: var(--font-main);
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
      display: inline-block;
    }

    .navbar-cta:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    /* ===== HERO SECTION ===== */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8rem 2rem 4rem;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background: var(--gradient-soft);
      z-index: 0;
    }

    .hero-blob-1 {
      position: absolute;
      top: -10%;
      right: -5%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255,77,109,0.12) 0%, transparent 70%);
      border-radius: 50%;
      z-index: 0;
      animation: blobFloat 8s ease-in-out infinite;
    }

    .hero-blob-2 {
      position: absolute;
      bottom: -10%;
      left: -5%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(123,45,139,0.1) 0%, transparent 70%);
      border-radius: 50%;
      z-index: 0;
      animation: blobFloat 10s ease-in-out infinite reverse;
    }

    @keyframes blobFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, -20px) scale(1.05); }
      66% { transform: translate(-15px, 15px) scale(0.97); }
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 800px;
      text-align: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255, 77, 109, 0.1);
      border: 1px solid rgba(255, 77, 109, 0.2);
      color: var(--color-primary-dark);
      padding: 0.4rem 1.2rem;
      border-radius: var(--radius-full);
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      animation: fadeInDown 0.6s ease both;
    }

    .hero-title {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      animation: fadeInUp 0.7s ease 0.1s both;
    }

    .hero-title .highlight {
      background: var(--gradient-main);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-title .cursive {
      font-family: var(--font-cursive);
      font-size: 1.2em;
    }

    .hero-subtitle {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: var(--color-text-light);
      margin-bottom: 2.5rem;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      animation: fadeInUp 0.7s ease 0.2s both;
    }

    .hero-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeInUp 0.7s ease 0.3s both;
    }

    .btn-primary {
      background: var(--gradient-main);
      color: var(--color-white);
      border: none;
      padding: 1rem 2.5rem;
      border-radius: var(--radius-full);
      font-family: var(--font-main);
      font-weight: 800;
      font-size: 1.05rem;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: var(--shadow-md);
    }

    .btn-primary:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: var(--shadow-lg);
    }

    .btn-primary:active {
      transform: translateY(-1px) scale(0.99);
    }

    .btn-secondary {
      background: transparent;
      color: var(--color-primary);
      border: 2px solid var(--color-primary);
      padding: 1rem 2.5rem;
      border-radius: var(--radius-full);
      font-family: var(--font-main);
      font-weight: 700;
      font-size: 1.05rem;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-secondary:hover {
      background: rgba(255, 77, 109, 0.08);
      transform: translateY(-2px);
    }

    /* ===== DEMO DEL BOTÓN ENOJADO ===== */
    .angry-demo {
      position: relative;
      z-index: 2;
      margin-top: 4rem;
      animation: fadeInUp 0.7s ease 0.5s both;
    }

    .demo-phone-wrapper {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .demo-phone {
      background: var(--color-bg-dark);
      border-radius: 40px;
      padding: 12px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.3);
      width: 240px;
      border: 2px solid rgba(255,255,255,0.1);
      position: relative;
    }

    .demo-phone::before {
      content: '';
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 6px;
      background: rgba(255,255,255,0.2);
      border-radius: 3px;
      z-index: 3;
    }

    .demo-screen {
      background: var(--color-white);
      border-radius: 30px;
      padding: 2rem 1rem;
      min-height: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      overflow: hidden;
    }

    /* Pantalla de enojo */
    .screen-angry .angry-emoji {
      font-size: 3rem;
      animation: shake 0.5s infinite;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px) rotate(-3deg); }
      75% { transform: translateX(4px) rotate(3deg); }
    }

    .screen-angry p {
      font-size: 0.8rem;
      color: var(--color-text-light);
      text-align: center;
      padding: 0 0.5rem;
    }

    .angry-btn {
      background: linear-gradient(135deg, #FF4D6D, #C9184A);
      color: white;
      border: none;
      padding: 0.9rem 1.2rem;
      border-radius: var(--radius-full);
      font-family: var(--font-main);
      font-weight: 800;
      font-size: 0.85rem;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 0.4rem;
      box-shadow: 0 6px 20px rgba(255, 77, 109, 0.4);
      animation: pulseCta 2s ease infinite;
      width: 100%;
      justify-content: center;
    }

    @keyframes pulseCta {
      0%, 100% { box-shadow: 0 6px 20px rgba(255,77,109,0.4); }
      50% { box-shadow: 0 8px 30px rgba(255,77,109,0.7), 0 0 0 8px rgba(255,77,109,0.1); }
    }

    .angry-btn:hover {
      transform: scale(1.05);
    }

    /* Pantalla de recuerdos (después de picar) */
    .screen-memories {
      background: linear-gradient(180deg
