<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ZipMarket - Delivery ultrarrápido en menos de 15 minutos. Comida, supermercado y más directo a tu puerta." />
  <meta name="keywords" content="delivery rápido, comida a domicilio, supermercado online, pedidos express" />
  <meta property="og:title" content="ZipMarket — Más rápido que el hambre" />
  <meta property="og:description" content="Recibe tu pedido en menos de 15 minutos. Comida, mercado y más." />
  <meta property="og:type" content="website" />
  <title>ZipMarket — Delivery en 15 minutos</title>

  <!-- Fuente moderna -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    /* =============================================
       RESET Y VARIABLES GLOBALES
    ============================================= */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-primary: #FF4B2B;
      --color-primary-dark: #e03b1e;
      --color-primary-light: #FF6B4A;
      --color-secondary: #FF8C00;
      --color-accent: #FFD700;
      --color-dark: #0F0F0F;
      --color-dark-2: #1A1A1A;
      --color-dark-3: #242424;
      --color-gray: #6B7280;
      --color-gray-light: #9CA3AF;
      --color-border: #2A2A2A;
      --color-white: #FFFFFF;
      --color-white-10: rgba(255,255,255,0.1);
      --color-white-05: rgba(255,255,255,0.05);
      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --border-radius-sm: 8px;
      --border-radius-md: 16px;
      --border-radius-lg: 24px;
      --border-radius-xl: 32px;
      --shadow-glow: 0 0 40px rgba(255, 75, 43, 0.3);
      --shadow-card: 0 4px 24px rgba(0,0,0,0.4);
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --max-width: 1200px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--color-dark);
      color: var(--color-white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* =============================================
       UTILIDADES
    ============================================= */
    .container {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 24px;
    }

    .gradient-text {
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: var(--transition);
      box-shadow: 0 4px 20px rgba(255, 75, 43, 0.4);
      white-space: nowrap;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(255, 75, 43, 0.6);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--color-white-10);
      color: white;
      border: 1px solid var(--color-border);
      border-radius: 50px;
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: var(--transition);
      backdrop-filter: blur(10px);
    }

    .btn-secondary:hover {
      background: var(--color-white-10);
      border-color: var(--color-primary);
      transform: translateY(-2px);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 75, 43, 0.15);
      border: 1px solid rgba(255, 75, 43, 0.3);
      color: var(--color-primary-light);
      border-radius: 50px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* =============================================
       NAVBAR
    ============================================= */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 16px 0;
      transition: var(--transition);
    }

    .navbar.scrolled {
      background: rgba(15, 15, 15, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--color-border);
      padding: 12px 0;
    }

    .navbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 15px rgba(255, 75, 43, 0.4);
    }

    .logo-text {
      font-size: 22px;
      font-weight: 900;
      color: var(--color-white);
      letter-spacing: -0.5px;
    }

    .logo-text span {
      color: var(--color-primary);
    }

    /* Navegación desktop */
    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      color: var(--color-gray-light);
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: var(--transition);
    }

    .nav-links a:hover {
      color: var(--color-white);
    }

    .nav-cta {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Menú hamburguesa (móvil) */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
      background: none;
      border: none;
    }

    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--color-white);
      border-radius: 2px;
      transition: var(--transition);
    }

    /* Menú móvil */
    .mobile-menu {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--color-dark-2);
      z-index: 999;
      padding: 100px 24px 40px;
      flex-direction: column;
      gap: 32px;
    }

    .mobile-menu.active {
      display: flex;
    }

    .mobile-menu a {
      color: var(--color-white);
      text-decoration: none;
      font-size: 28px;
      font-weight: 700;
      transition: var(--transition);
    }

    .mobile-menu a:hover {
      color: var(--color-primary);
    }

    /* =============================================
       HERO SECTION
    ============================================= */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding: 120px 0 80px;
    }

    /* Fondo con gradiente y elementos decorativos */
    .hero-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(255, 75, 43, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-blob-1 {
      position: absolute;
      top: 10%;
      right: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255, 140, 0, 0.08) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      animation: float 8s ease-in-out infinite;
    }

    .hero-blob-2 {
      position: absolute;
      bottom: 10%;
      left: -5%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255, 75, 43, 0.06) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      animation: float 10s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }

    /* Grid del hero */
    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .hero-content {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .hero-badge {
      align-self: flex-start;
    }

    .hero-title {
      font-size: clamp(40px, 5vw, 64px);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -2px;
    }

    .hero-description {
      font-size: 18px;
      color: var(--color-gray-light);
      max-width: 480px;
      line-height: 1.7;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    /* Estadísticas del hero */
    .hero-stats {
      display: flex;
      gap: 32px;
      padding-top: 16px;
      border-top: 1px solid var(--color-border);
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-number {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      font-size: 13px;
      color: var(--color-gray);
      font-weight: 500;
    }

    /* =============================================
       HERO VISUAL — APP MOCKUP
    ============================================= */
    .hero-visual {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .phone-mockup {
      width: 280px;
      background: var(--color-dark-3);
      border-radius: 40px;
      border: 1px solid var(--color-border);
      padding: 20px;
      box-shadow: var(--shadow-glow), var(--shadow-card), 0 0 0 8px rgba(255,255,255,0.02);
      position: relative;
      z-index: 2;
      animation: float 6s ease-in-out infinite;
    }

    /* Notch del teléfono */
    .phone-notch {
      width: 80px;
      height: 24px;
      background: var(--color-dark);
      border-radius: 20px;
      margin: 0 auto 16px;
    }

    /* Contenido del mockup */
    .app-header-mock {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .app-location {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--color-white);
    }

    .app-location-dot {
      width: 8px;
      height: 8px;
      background: var(--color-primary);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.3); }
    }

    .app-search-mock {
      background: var(--color-dark-
